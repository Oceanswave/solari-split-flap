<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solari Split-Flap Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #111;
      color: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .split-flap-board {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 8px;
      width: fit-content;
      margin: 0 auto;
      overflow: hidden;
    }

    .split-flap-row {
      display: flex;
      gap: 3px;
    }

    .split-flap-cell {
      width: 28px;
      height: 40px;
      perspective: 200px;
    }

    .flap-display {
      position: relative;
      width: 100%;
      height: 100%;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', ui-monospace, monospace;
      font-size: 1.1rem;
      font-weight: bold;
      color: #f0f0f0;
      text-align: center;
    }

    .flap-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: #2a2a2a;
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      z-index: 1;
    }

    .flap-top .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: #222222;
      border-radius: 0 0 3px 3px;
      overflow: hidden;
      z-index: 1;
    }

    .flap-bottom .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      transform-origin: center bottom;
      transform-style: preserve-3d;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    .flap-flip.flipping {
      display: block;
      animation: flapDown 0.15s ease-in forwards;
    }

    .flap-flip-front {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #2a2a2a;
      border-radius: 3px 3px 0 0;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .flap-flip-front .flap-char {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-flip-back {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #222222;
      border-radius: 0 0 3px 3px;
      backface-visibility: hidden;
      transform: rotateX(180deg);
      overflow: hidden;
    }

    .flap-flip-back .flap-char {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .flap-top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: #111;
      z-index: 5;
    }

    .split-flap-cell.author-cell .flap-top .flap-char,
    .split-flap-cell.author-cell .flap-bottom .flap-char,
    .split-flap-cell.author-cell .flap-flip-front .flap-char,
    .split-flap-cell.author-cell .flap-flip-back .flap-char {
      color: #f5c542;
    }

    @keyframes flapDown {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-180deg); }
    }

    @media (max-width: 768px) {
      .split-flap-cell { width: 18px; height: 28px; }
      .flap-display { font-size: 0.75rem; }
      .split-flap-board { gap: 2px; padding: 8px; }
      .split-flap-row { gap: 2px; }
    }

    @media (max-width: 480px) {
      .split-flap-cell { width: 14px; height: 22px; }
      .flap-display { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <div class="split-flap-board" data-cols="20" data-rows="8"></div>

  <script>
(function() {
  var board = document.querySelector('.split-flap-board');
  if (!board) return;

  var cols = parseInt(board.dataset.cols) || 20;
  var rows = parseInt(board.dataset.rows) || 8;
  var totalCells = cols * rows;
  var currentChars = [];
  var FLIP_MS = 150;
  var CHAR_DELAY = 50;
  var HOLD_MS = 5000;
  var audioCtx = null;
  var soundEnabled = false;

  // Build DOM
  for (var r = 0; r < rows; r++) {
    var rowEl = document.createElement('div');
    rowEl.className = 'split-flap-row';
    for (var c = 0; c < cols; c++) {
      var cell = document.createElement('div');
      cell.className = 'split-flap-cell';
      cell.innerHTML =
        '<div class="flap-display">' +
          '<div class="flap-top"><span class="flap-char"> </span></div>' +
          '<div class="flap-bottom"><span class="flap-char"> </span></div>' +
          '<div class="flap-flip">' +
            '<div class="flap-flip-front"><span class="flap-char"> </span></div>' +
            '<div class="flap-flip-back"><span class="flap-char"> </span></div>' +
          '</div>' +
        '</div>';
      rowEl.appendChild(cell);
      currentChars.push(' ');
    }
    board.appendChild(rowEl);
  }

  var cells = board.querySelectorAll('.split-flap-cell');

  // Audio
  function initAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      soundEnabled = true;
    } catch(e) {}
  }

  function playClick() {
    if (!soundEnabled || !audioCtx) return;
    var duration = 0.012;
    var now = audioCtx.currentTime;

    var bufferSize = Math.ceil(audioCtx.sampleRate * duration);
    var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.3;
    }

    var source = audioCtx.createBufferSource();
    source.buffer = buffer;

    var filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 1800 + Math.random() * 400;

    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.08 + Math.random() * 0.04, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start(now);
    source.stop(now + duration);
  }

  // Init audio on first interaction
  document.addEventListener('click', function() { initAudio(); }, { once: true });
  document.addEventListener('keydown', function() { initAudio(); }, { once: true });

  // Quotes — each line is one row, array of lines is one quote
  // Lines prefixed with @ are author names (rendered in yellow)
  var quotes = [
    ['DESIGN IS NOT JUST',
     'WHAT IT LOOKS LIKE.',
     'DESIGN IS HOW',
     'IT WORKS.',
     '',
     '@STEVE JOBS'],

    ['SIMPLICITY IS THE',
     'ULTIMATE',
     'SOPHISTICATION.',
     '',
     '@LEONARDO DA VINCI'],

    ['MAKE IT SIMPLE,',
     'BUT SIGNIFICANT.',
     '',
     '@DON DRAPER'],

    ['STAY HUNGRY.',
     'STAY FOOLISH.',
     '',
     '@STEVE JOBS'],

    ['HAVE THE COURAGE',
     'TO FOLLOW YOUR',
     'HEART AND',
     'INTUITION.',
     '',
     '@STEVE JOBS'],

    ['I THINK,',
     'THEREFORE I AM.',
     '',
     '@RENE DESCARTES'],

    ['THE ONLY THING WE',
     'HAVE TO FEAR IS',
     'FEAR ITSELF.',
     '',
     '@FDR'],

    ['IMAGINATION IS',
     'MORE IMPORTANT',
     'THAN KNOWLEDGE.',
     '',
     '@ALBERT EINSTEIN'],

    ['TO BE OR NOT',
     'TO BE, THAT IS',
     'THE QUESTION.',
     '',
     '@SHAKESPEARE'],

    ['IN THE MIDDLE OF',
     'DIFFICULTY LIES',
     'OPPORTUNITY.',
     '',
     '@ALBERT EINSTEIN'],

    ['THAT WHICH DOES',
     'NOT KILL US MAKES',
     'US STRONGER.',
     '',
     '@NIETZSCHE'],

    ['I HAVE NOT FAILED.',
     'I HAVE JUST FOUND',
     '10000 WAYS THAT',
     'WONT WORK.',
     '',
     '@THOMAS EDISON'],

    ['THE MEDIUM IS',
     'THE MESSAGE.',
     '',
     '@MARSHALL MCLUHAN']
  ];

  // Character drum — flaps cycle through this sequence like a real split-flap
  var drum = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.,!?\'"-:;()'.split('');
  var drumIndex = {};
  for (var di = 0; di < drum.length; di++) drumIndex[drum[di]] = di;

  // Per-cell timer tracking
  var cellTimers = [];
  for (var ct = 0; ct < totalCells; ct++) cellTimers.push([]);

  function cancelCell(index) {
    var timers = cellTimers[index];
    for (var t = 0; t < timers.length; t++) clearTimeout(timers[t]);
    cellTimers[index] = [];
  }

  function flipCell(index, newChar) {
    var cell = cells[index];
    if (!cell) return;

    var oldChar = currentChars[index];
    if (oldChar === newChar) return;

    var topChar = cell.querySelector('.flap-top .flap-char');
    var bottomChar = cell.querySelector('.flap-bottom .flap-char');
    var flip = cell.querySelector('.flap-flip');
    var flipFront = cell.querySelector('.flap-flip-front .flap-char');
    var flipBack = cell.querySelector('.flap-flip-back .flap-char');

    // Set up the flip: front shows old char (top half), back shows new char (bottom half)
    flipFront.textContent = oldChar;
    flipBack.textContent = newChar;

    // Bottom already shows new char (revealed as flap falls)
    bottomChar.textContent = newChar;

    // Reset and trigger animation
    flip.classList.remove('flipping');
    void flip.offsetWidth;
    flip.classList.add('flipping');
    playClick();

    var tid = setTimeout(function() {
      topChar.textContent = newChar;
      flip.classList.remove('flipping');
      currentChars[index] = newChar;
    }, FLIP_MS);
    cellTimers[index].push(tid);
  }

  // Drum through characters to reach target — like a real split-flap
  function drumToChar(index, targetChar, baseDelay) {
    cancelCell(index);

    var fromIdx = drumIndex[currentChars[index]];
    var toIdx = drumIndex[targetChar];
    if (fromIdx === undefined) fromIdx = 0;
    if (toIdx === undefined) toIdx = 0;

    var steps = [];
    var pos = fromIdx;
    while (pos !== toIdx) {
      pos = (pos + 1) % drum.length;
      steps.push(drum[pos]);
    }

    if (steps.length === 0) return 0;

    // Timing: fast at start, decelerate toward end
    var minGap = 35;
    var maxGap = 160;
    var cumulative = 0;

    for (var s = 0; s < steps.length; s++) {
      var progress = steps.length > 1 ? s / (steps.length - 1) : 1;
      var gap = minGap + (maxGap - minGap) * progress * progress;

      var tid = setTimeout(
        (function(idx, ch) {
          return function() { flipCell(idx, ch); };
        })(index, steps[s]),
        baseDelay + cumulative
      );
      cellTimers[index].push(tid);
      cumulative += gap;
    }

    return cumulative + FLIP_MS;
  }

  function layoutQuote(lines) {
    // Build target grid — center each line horizontally, center block vertically
    var grid = [];
    var authorRows = {};
    for (var r = 0; r < rows; r++) {
      var row = [];
      for (var c = 0; c < cols; c++) row.push(' ');
      grid.push(row);
    }

    var usedRows = Math.min(lines.length, rows);
    var startRow = Math.floor((rows - usedRows) / 2);

    for (var l = 0; l < usedRows; l++) {
      var line = lines[l];
      var isAuthor = line.charAt(0) === '@';
      if (isAuthor) {
        line = line.substring(1);
        authorRows[startRow + l] = true;
      }
      var pad = Math.floor((cols - line.length) / 2);
      for (var ch = 0; ch < line.length; ch++) {
        grid[startRow + l][pad + ch] = line[ch];
      }
    }

    return { grid: grid, authorRows: authorRows };
  }

  function displayQuote(result, callback) {
    var grid = result.grid;
    var authorRows = result.authorRows;

    // Set author-cell classes immediately
    cells.forEach(function(cell) { cell.classList.remove('author-cell'); });

    var maxDrumTime = 0;

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var idx = r * cols + c;
        var target = grid[r][c];
        var delay = (r * cols + c) * CHAR_DELAY;

        if (currentChars[idx] !== target) {
          var drumTime = drumToChar(idx, target, delay);
          if (delay + drumTime > maxDrumTime) maxDrumTime = delay + drumTime;
        }
      }
    }

    // Apply author classes after drums settle
    var authorRowsCopy = authorRows;
    setTimeout(function() {
      cells.forEach(function(cell) { cell.classList.remove('author-cell'); });
      for (var ar = 0; ar < rows; ar++) {
        if (authorRowsCopy[ar]) {
          for (var ac = 0; ac < cols; ac++) {
            cells[ar * cols + ac].classList.add('author-cell');
          }
        }
      }
    }, maxDrumTime + 100);

    setTimeout(function() {
      if (callback) setTimeout(callback, HOLD_MS);
    }, maxDrumTime + 200);
  }

  function clearBoard(callback) {
    cells.forEach(function(cell) { cell.classList.remove('author-cell'); });
    var grid = layoutQuote([]).grid;
    var totalDelay = 0;

    // Shuffle order for visual interest
    var indices = [];
    for (var i = 0; i < totalCells; i++) indices.push(i);
    for (var si = indices.length - 1; si > 0; si--) {
      var sj = Math.floor(Math.random() * (si + 1));
      var tmp = indices[si];
      indices[si] = indices[sj];
      indices[sj] = tmp;
    }

    for (var k = 0; k < indices.length; k++) {
      var idx = indices[k];
      var r = Math.floor(idx / cols);
      var c = idx % cols;
      var delay = k * 5;
      if (currentChars[idx] !== ' ') {
        (function(i, d) {
          setTimeout(function() { flipCell(i, ' '); }, d);
        })(idx, delay);
        totalDelay = delay + FLIP_MS;
      }
    }
    setTimeout(callback, totalDelay + 400);
  }

  // Shuffle quotes
  var shuffled = quotes.slice();
  for (var si = shuffled.length - 1; si > 0; si--) {
    var sj = Math.floor(Math.random() * (si + 1));
    var tmp = shuffled[si];
    shuffled[si] = shuffled[sj];
    shuffled[sj] = tmp;
  }

  var qIndex = 0;
  function cycle() {
    var quote = shuffled[qIndex % shuffled.length];
    var result = layoutQuote(quote);
    displayQuote(result, function() {
      qIndex++;
      clearBoard(function() {
        cycle();
      });
    });
  }

  // Start after a brief delay
  setTimeout(cycle, 500);

})();
  </script>
</body>
</html>
