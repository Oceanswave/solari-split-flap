name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Biome lint & format
        run: npx @biomejs/biome ci src/ vitest.config.ts

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npx tsc -p tsconfig.json
